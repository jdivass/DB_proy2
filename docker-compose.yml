services:

  database:
    env_file:
      - .env
    image: postgres:15
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "5433:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
  backend:
    env_file:
        - .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - database
volumes:
  database_data: