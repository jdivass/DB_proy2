<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cliente — StoreDB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">🏪 StoreDB</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link active" href="clients.html">Clientes</a></li>
          <li class="nav-item"><a class="nav-link" href="sales.html">Ventas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="d-flex align-items-center mb-4 gap-2">
          <a href="clients.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
          <h2 class="mb-0" id="page-title">Nuevo Cliente</h2>
        </div>

        <div id="msg-loading" class="text-center my-4">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Cargando...</p>
        </div>
        <div id="msg-error" class="alert alert-danger"></div>

        <div class="form-section">
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="nombre" placeholder="Nombre"/>
            </div>
            <div class="col-6">
              <label class="form-label">Apellido <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="apellido" placeholder="Apellido"/>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com"/>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label">Teléfono</label>
              <input type="text" class="form-control" id="telefono" placeholder="5555-5555"/>
            </div>
            <div class="col-6">
              <label class="form-label">NIT</label>
              <input type="text" class="form-control" id="nit" placeholder="CF"/>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="guardar()">Guardar</button>
            <a href="clients.html" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const clienteId = params.get('id');

    document.addEventListener('DOMContentLoaded', async () => {
      if (clienteId) {
        document.getElementById('page-title').textContent = 'Editar Cliente';
        setLoading(true);
        try {
          const c = await apiGet('/clients/' + clienteId);
          document.getElementById('nombre').value   = c.nombre;
          document.getElementById('apellido').value = c.apellido;
          document.getElementById('correo').value   = c.correo || '';
          document.getElementById('telefono').value = c.telefono || '';
          document.getElementById('nit').value      = c.nit || '';
        } catch (e) {
          showError(e.message);
        } finally {
          setLoading(false);
        }
      }
    });

    async function guardar() {
      const body = {
        nombre:   document.getElementById('nombre').value.trim(),
        apellido: document.getElementById('apellido').value.trim(),
        correo:   document.getElementById('correo').value.trim() || null,
        telefono: document.getElementById('telefono').value.trim() || null,
        nit:      document.getElementById('nit').value.trim() || null,
      };

      if (!body.nombre)   return showToast('El nombre es obligatorio', 'danger');
      if (!body.apellido) return showToast('El apellido es obligatorio', 'danger');

      try {
        if (clienteId) {
          await apiPut('/clients/' + clienteId, body);
          showToast('Cliente actualizado');
        } else {
          await apiPost('/clients', body);
          showToast('Cliente creado');
        }
        setTimeout(() => window.location.href = 'clients.html', 1000);
      } catch (e) {
        showToast(e.message, 'danger');
      }
    }
  </script>
</body>
</html>
