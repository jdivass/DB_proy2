<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Producto — StoreDB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">🏪 StoreDB</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="clients.html">Clientes</a></li>
          <li class="nav-item"><a class="nav-link" href="sales.html">Ventas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-7">

        <div class="d-flex align-items-center mb-4 gap-2">
          <a href="products.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
          <h2 class="mb-0" id="page-title">Nuevo Producto</h2>
        </div>

        <div id="msg-loading" class="text-center my-4">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Cargando...</p>
        </div>
        <div id="msg-error" class="alert alert-danger"></div>

        <div class="form-section">
          <div class="mb-3">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="nombre" placeholder="Nombre del producto"/>
          </div>

          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcion" rows="2" placeholder="Descripción opcional"></textarea>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label">Precio (Q) <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="precio" step="0.01" min="0" placeholder="0.00"/>
            </div>
            <div class="col-6">
              <label class="form-label">ID Categoría <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="id_categoria" min="1" placeholder="1"/>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label">Stock Actual <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="stock_actual" min="0" placeholder="0"/>
            </div>
            <div class="col-6">
              <label class="form-label">Stock Mínimo <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="stock_minimo" min="0" placeholder="0"/>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="guardar()">Guardar</button>
            <a href="products.html" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>

    const params = new URLSearchParams(window.location.search);
    const productoId = params.get('id');

    document.addEventListener('DOMContentLoaded', async () => {
      if (productoId) {
        // Edicion
        document.getElementById('page-title').textContent = 'Editar Producto';
        setLoading(true);
        try {
          const p = await apiGet('/products/' + productoId);
          document.getElementById('nombre').value       = p.nombre;
          document.getElementById('descripcion').value  = p.descripcion || '';
          document.getElementById('precio').value       = p.precio;
          document.getElementById('stock_actual').value = p.stock_actual;
          document.getElementById('stock_minimo').value = p.stock_minimo;
        } catch (e) {
          showError(e.message);
        } finally {
          setLoading(false);
        }
      }
    });

    async function guardar() {
    
      const body = {
        nombre:       document.getElementById('nombre').value.trim(),
        descripcion:  document.getElementById('descripcion').value.trim() || null,
        precio:       parseFloat(document.getElementById('precio').value),
        stock_actual: parseInt(document.getElementById('stock_actual').value),
        stock_minimo: parseInt(document.getElementById('stock_minimo').value),
        id_categoria: parseInt(document.getElementById('id_categoria').value) || 1,
      };

      if (!body.nombre) return showToast('El nombre es obligatorio', 'danger');
      if (isNaN(body.precio) || body.precio <= 0) return showToast('Ingresa un precio válido', 'danger');
      if (body.stock_minimo > body.stock_actual) return showToast('El stock mínimo no puede ser mayor al actual', 'danger');

      try {
        if (productoId) {
          await apiPut('/products/' + productoId, body);
          showToast('Producto actualizado');
        } else {
          await apiPost('/products', body);
          showToast('Producto creado');
        }
        // Redirigir de vuelta al listado
        setTimeout(() => window.location.href = 'products.html', 1000);
      } catch (e) {
        showToast(e.message, 'danger');
      }
    }
  </script>
</body>
</html>
