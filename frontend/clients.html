<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes — StoreDB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">🏪 StoreDB</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link active" href="clientes.html">Clientes</a></li>
          <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Clientes</h2>
      <a href="nuevo-cliente.html" class="btn btn-primary">+ Nuevo Cliente</a>
    </div>

    <div id="msg-loading" class="text-center my-4">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Cargando clientes...</p>
    </div>
    <div id="msg-error" class="alert alert-danger"></div>

    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>NIT</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-clientes">
            <tr><td colspan="6" class="text-center text-muted">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', cargarClientes);

    async function cargarClientes() {
      setLoading(true);
      try {
        const clientes = await apiGet('/clients');
        mostrarClientes(clientes);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }

    function mostrarClientes(clientes) {
      const tbody = document.getElementById('tabla-clientes');
      if (clientes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No hay clientes</td></tr>';
        return;
      }
      tbody.innerHTML = clientes.map(c => `
        <tr>
          <td>${c.id_cliente}</td>
          <td class="fw-semibold">${c.nombre} ${c.apellido}</td>
          <td>${c.correo || '—'}</td>
          <td>${c.telefono || '—'}</td>
          <td>${c.nit || 'CF'}</td>
          <td>
            <a href="nuevo-cliente.html?id=${c.id_cliente}" class="btn btn-sm btn-outline-secondary">Editar</a>
            <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${c.id_cliente}, '${c.nombre}')">Eliminar</button>
          </td>
        </tr>
      `).join('');
    }

    async function eliminar(id, nombre) {
      if (!confirm(`¿Eliminar al cliente "${nombre}"?`)) return;
      try {
        await apiDelete('/clients/' + id);
        showToast('Cliente eliminado');
        cargarClientes();
      } catch (e) {
        showToast(e.message, 'danger');
      }
    }
  </script>
</body>
</html>
