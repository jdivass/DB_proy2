<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nueva Venta — StoreDB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">🏪 StoreDB</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="clients.html">Clientes</a></li>
          <li class="nav-item"><a class="nav-link active" href="sales.html">Ventas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="d-flex align-items-center mb-4 gap-2">
      <a href="sales.html" class="btn btn-outline-secondary btn-sm">← Volver</a>
      <h2 class="mb-0">Nueva Venta</h2>
    </div>

    <div id="msg-loading" class="text-center my-4">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Cargando datos...</p>
    </div>
    <div id="msg-error" class="alert alert-danger"></div>

    <div class="row g-4">

      <div class="col-md-7">

        <!-- Datos generales de la venta -->
        <div class="form-section mb-4">
          <h5 class="mb-3">Datos de la Venta</h5>

          <div class="mb-3">
            <label class="form-label">Cliente <span class="text-danger">*</span></label>
            <select class="form-select" id="sel-cliente">
              <option value="">— Seleccionar cliente —</option>
            </select>
          </div>

          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">ID Empleado <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="id-empleado" value="1" min="1"/>
            </div>
            <div class="col-6">
              <label class="form-label">Método de Pago <span class="text-danger">*</span></label>
              <select class="form-select" id="sel-metodo">
                <option value="efectivo">Efectivo</option>
                <option value="tarjeta">Tarjeta</option>
                <option value="transferencia">Transferencia</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Agregar productos al carrito -->
        <div class="form-section">
          <h5 class="mb-3">Agregar Producto</h5>
          <div class="row g-2 align-items-end">
            <div class="col-7">
              <label class="form-label">Producto</label>
              <select class="form-select" id="sel-producto">
                <option value="">— Seleccionar —</option>
              </select>
            </div>
            <div class="col-3">
              <label class="form-label">Cantidad</label>
              <input type="number" class="form-control" id="cantidad" value="1" min="1"/>
            </div>
            <div class="col-2">
              <button class="btn btn-outline-primary w-100" onclick="agregarProducto()">+ Add</button>
            </div>
          </div>
        </div>

      </div>

      <div class="col-md-5">
        <div class="form-section">
          <h5 class="mb-3">🛒 Carrito</h5>

          <div id="cart-list">
            <p class="text-muted text-center">Sin productos agregados</p>
          </div>

          <div id="cart-total" class="d-none"></div>

          <button
            class="btn btn-success w-100 mt-3 d-none"
            id="btn-confirmar"
            onclick="confirmarVenta()"
          >
            ✓ Confirmar Venta
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Lista de items en el carrito
    let carrito = [];

    document.addEventListener('DOMContentLoaded', async () => {
      setLoading(true);
      try {
        const [clientes, productos] = await Promise.all([
          apiGet('/clients'),
          apiGet('/products'),
        ]);
        llenarClientes(clientes);
        llenarProductos(productos);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    });

    function llenarClientes(clientes) {
      const sel = document.getElementById('sel-cliente');
      clientes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id_cliente;
        opt.textContent = `${c.nombre} ${c.apellido}`;
        sel.appendChild(opt);
      });
    }

    function llenarProductos(productos) {
      const sel = document.getElementById('sel-producto');
      // Solo mostramos productos con stock disponible
      productos.filter(p => p.stock_actual > 0).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id_producto;
        opt.dataset.nombre = p.nombre;
        opt.dataset.precio = p.precio;
        opt.dataset.stock  = p.stock_actual;
        opt.textContent = `${p.nombre} (stock: ${p.stock_actual})`;
        sel.appendChild(opt);
      });
    }

    function agregarProducto() {
      const sel   = document.getElementById('sel-producto');
      const opt   = sel.options[sel.selectedIndex];
      const cant  = parseInt(document.getElementById('cantidad').value);

      if (!opt.value) return showToast('Selecciona un producto', 'danger');
      if (!cant || cant < 1) return showToast('La cantidad debe ser mayor a 0', 'danger');

      const stock = parseInt(opt.dataset.stock);
      if (cant > stock) return showToast(`Stock insuficiente. Máximo disponible: ${stock}`, 'danger');

      const existente = carrito.find(i => i.id_producto == opt.value);
      if (existente) {
        if (existente.cantidad + cant > stock) return showToast('Stock insuficiente', 'danger');
        existente.cantidad += cant;
      } else {
        carrito.push({
          id_producto: parseInt(opt.value),
          nombre:      opt.dataset.nombre,
          precio:      parseFloat(opt.dataset.precio),
          cantidad:    cant,
        });
      }

      renderCarrito();
    }

    function quitarProducto(index) {
      carrito.splice(index, 1);
      renderCarrito();
    }

    function renderCarrito() {
      const listEl    = document.getElementById('cart-list');
      const totalEl   = document.getElementById('cart-total');
      const btnEl     = document.getElementById('btn-confirmar');

      if (carrito.length === 0) {
        listEl.innerHTML = '<p class="text-muted text-center">Sin productos agregados</p>';
        totalEl.classList.add('d-none');
        btnEl.classList.add('d-none');
        return;
      }

      // Calcular total
      const total = carrito.reduce((sum, item) => sum + item.precio * item.cantidad, 0);

      // mostrar carrito
      listEl.innerHTML = carrito.map((item, i) => `
        <div class="cart-item">
          <div>
            <div class="fw-semibold">${item.nombre}</div>
            <div class="text-muted small">x${item.cantidad} × ${formatMoney(item.precio)}</div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span>${formatMoney(item.precio * item.cantidad)}</span>
            <button class="btn btn-sm btn-outline-danger" onclick="quitarProducto(${i})">✕</button>
          </div>
        </div>
      `).join('');

      totalEl.textContent = 'Total: ' + formatMoney(total);
      totalEl.classList.remove('d-none');
      btnEl.classList.remove('d-none');
    }

    async function confirmarVenta() {
      const clienteId = document.getElementById('sel-cliente').value;
      const empleadoId = document.getElementById('id-empleado').value;
      const metodo = document.getElementById('sel-metodo').value;

      if (!clienteId) return showToast('Selecciona un cliente', 'danger');
      if (carrito.length === 0) return showToast('El carrito está vacío', 'danger');

      const body = {
        id_cliente:  parseInt(clienteId),
        id_empleado: parseInt(empleadoId) || 1,
        metodo_pago: metodo,
        productos:   carrito.map(i => ({
          id_producto: i.id_producto,
          cantidad:    i.cantidad,
          precio:      i.precio,
        })),
      };

      try {
        const res = await apiPost('/sales', body);
        showToast(`Venta #${res.id_venta} registrada exitosamente`);
        // Redirigir al historial de ventas
        setTimeout(() => window.location.href = 'sales.html', 1200);
      } catch (e) {
        showToast(e.message, 'danger');
      }
    }
  </script>
</body>
</html>
