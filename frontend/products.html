<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Productos — StoreDB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">🏪 Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
          <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Productos</h2>
      <a href="nuevo-producto.html" class="btn btn-primary">+ Nuevo Producto</a>
    </div>

    <div id="msg-loading" class="text-center my-4">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Cargando productos...</p>
    </div>

    <div id="msg-error" class="alert alert-danger"></div>

    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-productos">
            <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', cargarProductos);

    async function cargarProductos() {
      setLoading(true);
      try {
        const productos = await apiGet('/products');
        mostrarProductos(productos);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }

    function mostrarProductos(productos) {
      const tbody = document.getElementById('tabla-productos');
      if (productos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No hay productos</td></tr>';
        return;
      }
      tbody.innerHTML = productos.map(p => `
        <tr>
          <td>${p.id_producto}</td>
          <td>
            <div class="fw-semibold">${p.nombre}</div>
            <div class="text-muted small">${p.descripcion || ''}</div>
          </td>
          <td>${p.categoria}</td>
          <td>${formatMoney(p.precio)}</td>
          <td>${p.stock_actual} <span class="text-muted small">/ mín ${p.stock_minimo}</span></td>
          <td><span class="${p.estado_stock === 'OK' ? 'badge-ok' : 'badge-low'}">${p.estado_stock}</span></td>
          <td>
            <a href="nuevo-producto.html?id=${p.id_producto}" class="btn btn-sm btn-outline-secondary">Editar</a>
            <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${p.id_producto}, '${p.nombre}')">Eliminar</button>
          </td>
        </tr>
      `).join('');
    }

    async function eliminar(id, nombre) {
      if (!confirm(`¿Eliminar el producto "${nombre}"?`)) return;
      try {
        await apiDelete('/products/' + id);
        showToast('Producto eliminado');
        cargarProductos(); // refresca la tabla
      } catch (e) {
        showToast(e.message, 'danger');
      }
    }
  </script>
</body>
</html>
