<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ventas — StoreDB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">🏪 StoreDB</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="clients.html">Clientes</a></li>
          <li class="nav-item"><a class="nav-link active" href="sales.html">Ventas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Ventas</h2>
      <a href="newSale.html" class="btn btn-primary">+ Nueva Venta</a>
    </div>

    <div id="msg-loading" class="text-center my-4">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Cargando ventas...</p>
    </div>
    <div id="msg-error" class="alert alert-danger"></div>

    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Fecha</th>
              <th>Método de Pago</th>
              <th>Productos</th>
              <th>Total</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-ventas">
            <tr><td colspan="6" class="text-center text-muted">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Detalle de venta -->
    <div class="card mt-4 d-none" id="panel-detalle">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-semibold" id="detalle-titulo">Detalle de Venta</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="cerrarDetalle()">✕ Cerrar</button>
      </div>
      <div class="card-body" id="detalle-contenido"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', cargarVentas);

    async function cargarVentas() {
      setLoading(true);
      try {
        const ventas = await apiGet('/sales');
        mostrarVentas(ventas);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }

    function mostrarVentas(ventas) {
      const tbody = document.getElementById('tabla-ventas');
      if (ventas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No hay ventas registradas</td></tr>';
        return;
      }
      tbody.innerHTML = ventas.map(v => `
        <tr>
          <td>#${v.id_venta}</td>
          <td>${formatDate(v.fecha)}</td>
          <td><span class="badge bg-secondary">${v.metodo_pago}</span></td>
          <td class="text-muted small">${v.productos.map(p => p.producto).join(', ')}</td>
          <td class="fw-semibold">${formatMoney(v.total)}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick="verDetalle(${v.id_venta})">Ver</button>
            <button class="btn btn-sm btn-outline-danger" onclick="anular(${v.id_venta})">Anular</button>
          </td>
        </tr>
      `).join('');
    }

    async function verDetalle(id) {
      try {
        const v = await apiGet('/sales/' + id);
        document.getElementById('detalle-titulo').textContent = `Detalle de Venta #${v.id_venta}`;
        document.getElementById('detalle-contenido').innerHTML = `
          <p><strong>Método de pago:</strong> ${v.metodo_pago} &nbsp;|&nbsp; <strong>Fecha:</strong> ${formatDate(v.fecha)}</p>
          <table class="table table-sm">
            <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio</th><th>Subtotal</th></tr></thead>
            <tbody>
              ${v.productos.map(p => `
                <tr>
                  <td>${p.producto}</td>
                  <td>${p.cantidad}</td>
                  <td>${formatMoney(p.precio)}</td>
                  <td>${formatMoney(p.subtotal)}</td>
                </tr>
              `).join('')}
            </tbody>
            <tfoot>
              <tr><td colspan="3" class="text-end fw-bold">Total:</td><td class="fw-bold">${formatMoney(v.total)}</td></tr>
            </tfoot>
          </table>
        `;
        document.getElementById('panel-detalle').classList.remove('d-none');
        // Scroll hacia el detalle
        document.getElementById('panel-detalle').scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        showToast(e.message, 'danger');
      }
    }

    function cerrarDetalle() {
      document.getElementById('panel-detalle').classList.add('d-none');
    }

    async function anular(id) {
      if (!confirm(`¿Anular la venta #${id}? El stock de los productos será restaurado.`)) return;
      try {
        await apiDelete('/sales/' + id);
        showToast('Venta anulada');
        cerrarDetalle();
        cargarVentas();
      } catch (e) {
        showToast(e.message, 'danger');
      }
    }
  </script>
</body>
</html>
